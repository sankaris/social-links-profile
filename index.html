<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Inter"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Social links profile</title>
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main">
        <div class="persona">
          <div class="profilePic">
            <img class="profileImg" src="/assets/images/avatar-jessica.jpeg" />
          </div>
          <div class="profileData">
            <h4 class="name">Jessica Randall</h4>
            <p class="country">London, United Kingdom</p>
            <p class="tagLine">"Front-end developer and avid reader."</p>
          </div>
        </div>
        <div class="socialBtn">
          <button class="icon">GitHub</button>
          <button class="icon">Frontend Mentor</button>
          <button class="icon">LinkedIn</button>
          <button class="icon">Twitter</button>
          <button class="icon">Instagram</button>
        </div>
      </div>
    </div>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
